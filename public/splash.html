<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maestro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw;
      height: 100vh;
      background: #09090B;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(to right, #27272A 1px, transparent 1px),
        linear-gradient(to bottom, #27272A 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
    }
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .logo {
      width: 96px;
      height: 96px;
    }
    .brand {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 6px;
      color: #FAFAFA;
    }
    .cursor {
      display: inline-block;
      width: 10px;
      height: 18px;
      background: #A3E635;
      margin-left: 6px;
      vertical-align: middle;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="content">
    <img class="logo" src="logo/logo.svg" alt="Maestro" />
    <div class="brand">
      MAESTRO<span class="cursor"></span>
    </div>
  </div>
</body>
</html>
